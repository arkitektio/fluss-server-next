name: CI
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
jobs:
  test_suit:
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.12"]
        # The suite brings up a Postgres backend via docker compose
        # (tests/integration/docker-compose.yaml), available only on Linux runners.
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}
      
      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Run tests
        run: uv run pytest